<!DOCTYPE html>
<html>
    <head>
        <style>
        .testbtn {
        background-color:darkslategrey;
        color: white;
        font-size: 15px;
        padding: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        height:40px;
        width:200px;
        }

        .testbtn:hover {
        background-color: #059862;
        }

        td {
        padding-left: 20px;
        }
        </style>
    </head>


    <body style="font-family: Arial, sans-serif; margin: 20px; background-color: #333333; color: white;">
    
    <h1>Motor Controller</h1>

    
    <fieldset>
        <legend>Motor 1</legend>
        <form action="/Motor1" method="GET">
            <button type="submit" name="command" value="RunFwd">Run FWD</button>
            <button type="submit" name="command" value="Stop">Stop</button>
            <button type="submit" name="command" value="RunRev">Run REV</button>
            <label>FX Speed: <input type="range" name="rpm" min="0" max="128" value="128" onchange="this.form.submit()"></label>
        </form>
    </fieldset>
    
    <fieldset>
        <legend>Motor 2</legend>
        <form action="/Motor2" method="GET">
            <button type="submit" name="command" value="RunFwd">Run FWD</button>
            <button type="submit" name="command" value="Stop">Stop</button>
            <button type="submit" name="command" value="RunRev">Run REV</button>
            <label>FX Speed: <input type="range" name="rpm" min="0" max="128" value="128" onchange="this.form.submit()"></label>
        </form>
    </fieldset>
    
    
    <fieldset>
        <legend>Network</legend>
        <form action="/SaveSettings" method="GET">
            <table>
                <tr>
                    <td>Artnet Universe</td>
                    <td><input value="#UNI#" name="uni"></input></td>
                </tr>
                <tr>
                    <td>Artnet DMX Address</td>
                    <td><input value="#ADDR#" name="addr"></input></td>
                </tr>
                <tr>
                    <td>PWM Frequency</td>
                    <td><input value="#FREQ#" name="freq"></input></td>
                </tr>
                <tr>
                    <td>Current Limit (A)</td>
                    <td><input value="#CUR#" name="cur"></input></td>
                </tr>
                <tr>
                    <td>IP</td>
                    <td><input value="#IP#" name="ip"></input></td>
                </tr>
                <tr>
                    <td>Subnet Mask</td>
                    <td><input value="#SUBNET#" name="subnet"/></td>
                </tr>
                 <tr>
                    <td>Default Gateway Mask</td>
                    <td><input value="#GATEWAY#" name="gateway"/></td>
                </tr>
                <tr>
                    <td>DNS</td>
                    <td><input value="#DNS#" name="dns"/></td>
                </tr>
            </table>
            <button type="submit">Save</button>
        </form>
    </fieldset>
</body>
</html>
